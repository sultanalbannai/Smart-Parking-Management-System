<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMS Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🅿️</span>
                <h1>Smart Parking System</h1>
            </div>
            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="status online" id="status">
                    <span class="dot"></span>
                    <span>ONLINE</span>
                </div>
            </div>
        </header>

        <!--Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card total">
                <div class="stat-icon">📊</div>
                <div class="stat-content">
                    <div class="stat-label">Total Bays</div>
                    <div class="stat-value" id="totalBays">-</div>
                </div>
            </div>

            <div class="stat-card available">
                <div class="stat-icon">✅</div>
                <div class="stat-content">
                    <div class="stat-label">Available</div>
                    <div class="stat-value" id="availableBays">-</div>
                </div>
            </div>

            <div class="stat-card pending">
                <div class="stat-icon">⏳</div>
                <div class="stat-content">
                    <div class="stat-label">Pending</div>
                    <div class="stat-value" id="pendingBays">-</div>
                </div>
            </div>

            <div class="stat-card occupied">
                <div class="stat-icon">🚗</div>
                <div class="stat-content">
                    <div class="stat-label">Occupied</div>
                    <div class="stat-value" id="occupiedBays">-</div>
                </div>
            </div>
        </div>

        <!-- Occupancy Bar -->
        <div class="occupancy-container">
            <h3>Occupancy Rate</h3>
            <div class="occupancy-bar">
                <div class="occupancy-fill" id="occupancyFill"></div>
            </div>
            <div class="occupancy-text" id="occupancyText">0%</div>
        </div>

        <!-- Parking Bays -->
        <div class="bays-section">
            <div class="section-header">
                <h2>Parking Bay Status</h2>
                <div class="legend">
                    <span><span class="dot available"></span> Available</span>
                    <span><span class="dot pending"></span> Pending</span>
                    <span><span class="dot occupied"></span> Occupied</span>
                </div>
            </div>
            
            <div class="entrance-label">← ENTRANCE</div>
            <div class="bay-grid" id="bayGrid"></div>
        </div>

        <!-- Activity Feed -->
        <div class="activity-section">
            <h3>Live Activity</h3>
            <div class="activity-feed" id="activityFeed">
                <div class="activity-item">
                    <span class="time">--:--:--</span>
                    <span>System ready</span>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
