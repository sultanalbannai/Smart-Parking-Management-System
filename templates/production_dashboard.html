<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mall Parking - Production Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/production.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🏬</span>
                <h1 id="facilityName">Grand Mall Parking</h1>
            </div>
            <div class="header-right">
                <div class="time" id="currentTime">--:--:--</div>
                <div class="status online" id="status">
                    <span class="dot"></span>
                    <span>ONLINE</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Left Panel: Stats & Zones -->
            <aside class="left-panel">
                <!-- Overall Stats -->
                <div class="card">
                    <h3>Overall Status</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="totalBays">-</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-box available">
                            <div class="stat-value" id="availableBays">-</div>
                            <div class="stat-label">Available</div>
                        </div>
                        <div class="stat-box occupied">
                            <div class="stat-value" id="occupiedBays">-</div>
                            <div class="stat-label">Occupied</div>
                        </div>
                    </div>
                    <div class="occupancy-section">
                        <div class="occupancy-bar">
                            <div class="occupancy-fill" id="occupancyFill"></div>
                        </div>
                        <div class="occupancy-label">
                            <span id="occupancyText">0%</span> Occupancy
                        </div>
                    </div>
                </div>

                <!-- Zone Breakdown -->
                <div class="card">
                    <h3>Zones & Entrances</h3>
                    <div id="zonesList"></div>
                </div>

                <!-- Category Breakdown -->
                <div class="card">
                    <h3>By Category</h3>
                    <div id="categoryList"></div>
                </div>

                <!-- Legend -->
                <div class="card">
                    <h3>Legend</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-dot available"></span>
                            <span>Available</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot occupied"></span>
                            <span>Occupied</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-badge pod">♿</span>
                            <span>POD</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-badge family">👨‍👩‍👧</span>
                            <span>Family</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-badge staff">👔</span>
                            <span>Staff</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Center: Visual Parking Map -->
            <main class="map-container">
                <div class="map-header">
                    <h2>Parking Layout - Ground Level</h2>
                    <div class="map-controls">
                        <button class="btn-zoom" id="btnZoomIn">+</button>
                        <button class="btn-zoom" id="btnZoomOut">−</button>
                        <button class="btn-zoom" id="btnReset">⟲</button>
                    </div>
                </div>
                <div class="map-wrapper" id="mapWrapper">
                    <svg id="parkingMap" viewBox="0 0 1400 920" preserveAspectRatio="xMidYMid meet">
                        <!-- Compass rose (top right) -->
                        <g transform="translate(1320, 70)">
                            <circle cx="0" cy="0" r="25" fill="#1a1f35" stroke="#475569" stroke-width="2"/>
                            <text x="0" y="-12" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">N</text>
                            <text x="12" y="4" text-anchor="middle" fill="#64748b" font-size="10">E</text>
                            <text x="0" y="17" text-anchor="middle" fill="#64748b" font-size="10">S</text>
                            <text x="-12" y="4" text-anchor="middle" fill="#64748b" font-size="10">W</text>
                        </g>
                        
                        <!-- Mall building (center) -->
                        <rect x="420" y="260" width="360" height="280" 
                              fill="#1a1f35" stroke="#475569" stroke-width="3" rx="10"/>
                        <text x="600" y="360" text-anchor="middle" fill="#94a3b8" font-size="24" font-weight="bold">
                            MALL
                        </text>
                        <text x="600" y="390" text-anchor="middle" fill="#64748b" font-size="16">
                            Shopping Center
                        </text>
                        <text x="600" y="430" text-anchor="middle" fill="#64748b" font-size="14">
                            Food Court • Cinema
                        </text>
                        <text x="600" y="450" text-anchor="middle" fill="#64748b" font-size="14">
                            Fashion • Entertainment
                        </text>
                        
                        <!-- Parking bays will be inserted here by JavaScript -->
                        <g id="parkingBays"></g>
                        
                        <!-- Entrance markers will be inserted here -->
                        <g id="entranceMarkers"></g>
                    </svg>
                </div>
            </main>

            <!-- Right Panel: Activity Feed -->
            <aside class="right-panel">
                <div class="card">
                    <h3>Live Activity</h3>
                    <div class="activity-feed" id="activityFeed">
                        <div class="activity-item">
                            <span class="time">--:--:--</span>
                            <span>System initialized</span>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/production_dashboard.js') }}"></script>
</body>
</html>
