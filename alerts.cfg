# ═══════════════════════════════════════════════════════════════════════════════
#  SPMS Alert Configuration
#  Edit this file to configure email and SMS notifications.
# ═══════════════════════════════════════════════════════════════════════════════

[email]
# Set enabled = true and fill in your credentials to activate email alerts
enabled = false

# Gmail recommended — use an App Password (not your real password)
# How to get a Gmail App Password:
#   1. Go to myaccount.google.com → Security → 2-Step Verification → App passwords
#   2. Generate a password for "Mail" and paste it below
smtp_host     = smtp.gmail.com
smtp_port     = 587
username      = your_email@gmail.com
password      = your_app_password_here
from_name     = SPMS Alerts

# Comma-separated list of recipient emails
recipients    = admin@example.com


[sms]
# Set enabled = true and fill in Twilio credentials to activate SMS alerts
# Sign up free at twilio.com — you get a trial number
enabled = false

twilio_sid    = YOUR_TWILIO_ACCOUNT_SID
twilio_token  = YOUR_TWILIO_AUTH_TOKEN
from_number   = +1234567890

# Comma-separated list of recipient phone numbers (include country code)
recipients    = +1234567890


[thresholds]
# Alert when occupancy reaches these percentages
high_occupancy      = 80
critical_occupancy  = 90

# Minutes to wait before sending the same alert again (prevents spam)
cooldown_minutes    = 30


[daily_report]
# Send a daily summary email with occupancy stats
enabled = false

# Time to send (24-hour format, server local time)
send_time = 08:00
