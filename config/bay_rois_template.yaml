# Bay ROI Configuration  -  generated by calibrate_bay_rois.py
#
# Each 'roi' is [x1, y1, x2, y2] in the camera's pixel frame (1280x720).
# Edit manually only if you know the exact coordinates; otherwise run:
#
#   python calibrate_bay_rois.py
#
# That tool opens each camera, lets you drag rectangles over each bay,
# and overwrites this file automatically.

cameras:

  # ── Camera 0  (Row 1 – Staff, farthest from entrance) ────────────────────
  - camera_index: 0
    bays:
      - bay_id: STF-01
        roi: []        # [x1, y1, x2, y2]  fill via calibration tool
      - bay_id: STF-02
        roi: []
      - bay_id: STF-03
        roi: []
      - bay_id: STF-04
        roi: []

  # ── Camera 1  (Row 2 – POD / Accessible) ─────────────────────────────────
  - camera_index: 1
    bays:
      - bay_id: POD-01
        roi: []
      - bay_id: POD-02
        roi: []
      - bay_id: POD-03
        roi: []
      - bay_id: POD-04
        roi: []

  # ── Camera 2  (Row 3 – General) ───────────────────────────────────────────
  - camera_index: 2
    bays:
      - bay_id: G-01
        roi: []
      - bay_id: G-02
        roi: []
      - bay_id: G-03
        roi: []
      - bay_id: G-04
        roi: []
