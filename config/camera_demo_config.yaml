# Camera Demo Configuration - Single Entrance, 16 Bays
# 2 POD  + 2 STAFF + 12 GENERAL  =  16 bays total
# 3 bay-cameras cover the lot continuously for occupancy + plate logging

facility_name: "Smart Parking System - Camera Demo"
facility_id: "DEMO_CAMERA_001"

database_path: "data/spms.db"

map_width: 1200
map_height: 850

# ── Layout (top = far from entrance, bottom = entrance) ──────────────────────
#
#  Row 3 (farthest)   G-07  G-08  G-09  G-10  G-11  G-12   ← Camera 2
#  Row 2              G-01  G-02  G-03  G-04  G-05  G-06   ← Camera 1
#  Row 1 (closest)    POD-01  POD-02  STF-01  STF-02        ← Camera 0
#                               [MAIN ENTRANCE]
#
# SVG viewBox : 0 0 1200 850
# Bay size    : 80 × 48 px
# ─────────────────────────────────────────────────────────────────────────────

parking_zones:
  - zone_id: "MAIN"
    zone_name: "Main Parking"
    entrance_id: "ENTRANCE_MAIN"
    entrance_name: "Main Entrance"
    entrance_color: "#3B82F6"
    entrance_x: 600
    entrance_y: 760

    bays:
      # ── Row 1 (y=560) – 4 bays, centred ─────────────────────────────────
      # 4 × 80 + 3 × 40 = 440 px  →  start_x = (1200-440)/2 = 380
      - {id: "POD-01", category: "POD",   distance: 30, x: 380, y: 560}
      - {id: "POD-02", category: "POD",   distance: 32, x: 500, y: 560}
      - {id: "STF-01", category: "STAFF", distance: 34, x: 620, y: 560}
      - {id: "STF-02", category: "STAFF", distance: 36, x: 740, y: 560}

      # ── Row 2 (y=430) – 6 GENERAL bays ───────────────────────────────────
      # 6 × 80 + 5 × 50 = 730 px  →  start_x = (1200-730)/2 = 235
      - {id: "G-01", category: "GENERAL", distance: 55, x: 235, y: 430}
      - {id: "G-02", category: "GENERAL", distance: 57, x: 365, y: 430}
      - {id: "G-03", category: "GENERAL", distance: 59, x: 495, y: 430}
      - {id: "G-04", category: "GENERAL", distance: 61, x: 625, y: 430}
      - {id: "G-05", category: "GENERAL", distance: 63, x: 755, y: 430}
      - {id: "G-06", category: "GENERAL", distance: 65, x: 885, y: 430}

      # ── Row 3 (y=300) – 6 GENERAL bays ───────────────────────────────────
      - {id: "G-07", category: "GENERAL", distance: 85, x: 235, y: 300}
      - {id: "G-08", category: "GENERAL", distance: 87, x: 365, y: 300}
      - {id: "G-09", category: "GENERAL", distance: 89, x: 495, y: 300}
      - {id: "G-10", category: "GENERAL", distance: 91, x: 625, y: 300}
      - {id: "G-11", category: "GENERAL", distance: 93, x: 755, y: 300}
      - {id: "G-12", category: "GENERAL", distance: 95, x: 885, y: 300}

# ── Bay-camera assignment ─────────────────────────────────────────────────────
# Each entry = one physical USB camera watching a group of bays.
# ROI pixel coordinates are populated by:  python calibrate_bay_rois.py
bay_cameras:
  - camera_index: 0
    label: "Camera 0 – Row 1 (POD / Staff)"
    bays: [POD-01, POD-02, STF-01, STF-02]

  - camera_index: 1
    label: "Camera 1 – Row 2 (General G-01..G-06)"
    bays: [G-01, G-02, G-03, G-04, G-05, G-06]

  - camera_index: 2
    label: "Camera 2 – Row 3 (General G-07..G-12)"
    bays: [G-07, G-08, G-09, G-10, G-11, G-12]

# System behaviour
suggestion_mode: true
confirmation_timeout_sec: 300
log_level: "INFO"
