# Camera Demo Configuration - Single Entrance, 16 Bays
# 8 STAFF (4 top + 4 bottom)  +  4 POD  +  4 GENERAL  =  16 bays total
# 3 bay-cameras cover Rows 1-3; Row 4 (entrance side) is nearest the gate.
#
# Physical layout (matches cardboard mock-up):
#
#  Row 1 (farthest)   STF-01  STF-02  STF-03  STF-04   [Staff]       <- Camera 0
#  Row 2              POD-01  POD-02  POD-03  POD-04   [Accessible]  <- Camera 1
#  Row 3              G-01    G-02    G-03    G-04     [General]     <- Camera 2
#  Row 4 (closest)    STF-05  STF-06  STF-07  STF-08   [Staff]
#                              [MAIN ENTRANCE]
#
# SVG viewBox : 0 0 1200 850
# Bay size    : 80 x 48 px
# 4 bays centred: 4x80 + 3x40 = 440 px  ->  start_x = (1200-440)/2 = 380
# x positions: 380, 500, 620, 740
# ─────────────────────────────────────────────────────────────────────────────

facility_name: "Smart Parking System - Camera Demo"
facility_id: "DEMO_CAMERA_001"

database_path: "data/spms.db"

map_width: 1200
map_height: 850

parking_zones:
  - zone_id: "MAIN"
    zone_name: "Main Parking"
    entrance_id: "ENTRANCE_MAIN"
    entrance_name: "Main Entrance"
    entrance_color: "#3B82F6"
    entrance_x: 600
    entrance_y: 760

    bays:
      # ── Row 1 (y=170) – Staff, farthest from entrance ────────────────────
      - {id: "STF-01", category: "STAFF",   distance: 85, x: 380, y: 170}
      - {id: "STF-02", category: "STAFF",   distance: 87, x: 500, y: 170}
      - {id: "STF-03", category: "STAFF",   distance: 89, x: 620, y: 170}
      - {id: "STF-04", category: "STAFF",   distance: 91, x: 740, y: 170}

      # ── Row 2 (y=300) – POD / Accessible ─────────────────────────────────
      - {id: "POD-01", category: "POD",     distance: 60, x: 380, y: 300}
      - {id: "POD-02", category: "POD",     distance: 62, x: 500, y: 300}
      - {id: "POD-03", category: "POD",     distance: 64, x: 620, y: 300}
      - {id: "POD-04", category: "POD",     distance: 66, x: 740, y: 300}

      # ── Row 3 (y=430) – General ───────────────────────────────────────────
      - {id: "G-01",   category: "GENERAL", distance: 40, x: 380, y: 430}
      - {id: "G-02",   category: "GENERAL", distance: 42, x: 500, y: 430}
      - {id: "G-03",   category: "GENERAL", distance: 44, x: 620, y: 430}
      - {id: "G-04",   category: "GENERAL", distance: 46, x: 740, y: 430}

      # ── Row 4 (y=560) – Staff, closest to entrance ───────────────────────
      - {id: "STF-05", category: "STAFF",   distance: 25, x: 380, y: 560}
      - {id: "STF-06", category: "STAFF",   distance: 27, x: 500, y: 560}
      - {id: "STF-07", category: "STAFF",   distance: 29, x: 620, y: 560}
      - {id: "STF-08", category: "STAFF",   distance: 31, x: 740, y: 560}

# ── Bay-camera assignment ─────────────────────────────────────────────────────
# Each entry = one physical USB camera watching a group of bays.
# ROI pixel coordinates are populated by:  python calibrate_bay_rois.py
bay_cameras:
  - camera_index: 0
    label: "Camera 0 - Row 1 (Staff - far)"
    bays: [STF-01, STF-02, STF-03, STF-04]

  - camera_index: 1
    label: "Camera 1 - Row 2 (POD - accessible)"
    bays: [POD-01, POD-02, POD-03, POD-04]

  - camera_index: 2
    label: "Camera 2 - Row 3 (General)"
    bays: [G-01, G-02, G-03, G-04]

# System behaviour
suggestion_mode: true
confirmation_timeout_sec: 300
log_level: "INFO"
