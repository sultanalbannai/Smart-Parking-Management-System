# Camera Demo Configuration - Single Entrance, 36 Bays
# Uses real camera ALPR instead of plate generation

facility_name: "Smart Parking System - Camera Demo"
facility_id: "DEMO_CAMERA_001"

# Database
database_path: "data/spms.db"

# Display settings
map_width: 1200
map_height: 850

# Single entrance parking layout - 36 bays in 4 rows
# Layout (viewed from top, entrance at bottom-center):
#
#  Row 4 (farthest) : P-28 P-29 P-30 P-31 P-32 P-33 P-34 P-35 P-36
#  Row 3            : P-19 P-20 P-21 P-22 P-23 P-24 P-25 P-26 P-27
#  Row 2            : P-10 P-11 P-12 P-13 P-14 P-15 P-16 P-17 P-18
#  Row 1 (closest)  : P-01 P-02 P-03 P-04 P-05 P-06 P-07 P-08 P-09
#                              [MAIN ENTRANCE]

parking_zones:
  - zone_id: "MAIN"
    zone_name: "Main Parking"
    entrance_id: "ENTRANCE_MAIN"
    entrance_name: "Main Entrance"
    entrance_color: "#3B82F6"
    entrance_x: 600
    entrance_y: 760
    bays:
      # ── Row 1 (closest to entrance, y=560) ──
      # P-01, P-02 are POD (reserved, nearest to entrance)
      # P-03 is STAFF
      # P-04..P-09 are GENERAL
